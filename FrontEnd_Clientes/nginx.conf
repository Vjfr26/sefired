server {
    listen 5174;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión — reduce el payload hasta 70%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/html text/css text/javascript
        application/javascript application/json
        image/svg+xml font/woff2;

    # Assets con hash (JS/CSS generados por Vite) — caché de 1 año
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Imágenes, fuentes, iconos — caché de 30 días
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # js/main.js no tiene hash de contenido en el nombre (no lo procesa Vite,
    # se referencia como <script src> clásico) — sin esto el navegador lo
    # cachea de forma heurística y puede seguir sirviendo una versión vieja
    # después de cada despliegue.
    location = /js/main.js {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # SPA — cualquier ruta que no sea archivo devuelve index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html NO se cachea (el browser necesita la versión más reciente)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
    }

    # Proxy hacia el backend para /api y /storage
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /storage/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sefired — Panel Interno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-[#0f172a] text-white flex flex-col fixed inset-y-0 left-0 z-50">
        <div class="px-5 py-5 border-b border-white/10 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/40 shrink-0">
                    <span class="font-extrabold text-base">S</span>
                </div>
                <div>
                    <h1 class="text-sm font-bold leading-tight">Sefired</h1>
                    <p class="text-[11px] text-blue-400 font-medium">Panel Interno</p>
                </div>
            </div>
        </div>

        <nav id="sidebar-nav" class="flex-1 px-3 py-3 overflow-y-auto space-y-0.5"></nav>

        <div class="px-3 py-3 border-t border-white/10 shrink-0">
            <div class="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-white/5 cursor-pointer transition">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-xs font-bold shrink-0">VA</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold truncate">Victor Admin</p>
                    <p class="text-[11px] text-slate-400 truncate">Gerente Regional</p>
                </div>
                <i data-lucide="log-out" class="w-4 h-4 text-slate-500 hover:text-white shrink-0 transition-colors"></i>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 ml-64 flex flex-col min-h-screen">
        <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200/80 px-8 py-4 flex items-center justify-between shrink-0">
            <div>
                <h2 id="page-title" class="text-xl font-bold text-slate-800">—</h2>
                <p id="page-subtitle" class="text-xs text-slate-500 mt-0.5">—</p>
            </div>
            <!-- User dropdown -->
            <div class="relative" id="user-menu-wrap">
                <button id="user-menu-btn" class="flex items-center gap-2.5 px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors cursor-pointer select-none">
                    <div class="w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-xs font-bold text-white shrink-0">VA</div>
                    <div class="text-left">
                        <p class="text-sm font-semibold text-slate-800 leading-tight">Victor Admin</p>
                        <p class="text-[10px] text-slate-500 leading-tight">Gerente Regional</p>
                    </div>
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-400 ml-1 transition-transform duration-200" id="user-chevron"></i>
                </button>
                <div id="user-menu-dropdown" class="hidden absolute right-0 top-full mt-2 w-52 bg-white border border-slate-200 rounded-2xl shadow-xl py-1.5 z-50">
                    <div class="px-4 py-2.5 border-b border-slate-100 mb-1">
                        <p class="text-xs font-semibold text-slate-700">Victor Admin</p>
                        <p class="text-[11px] text-slate-400">Gerente Regional · Sefired</p>
                    </div>
                    <button id="menu-go-perfil" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2.5 transition-colors">
                        <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                        Mi Perfil
                    </button>
                    <button id="menu-go-config" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2.5 transition-colors">
                        <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i>
                        Configuración
                    </button>
                    <div class="border-t border-slate-100 my-1"></div>
                    <button id="menu-logout" class="w-full text-left px-4 py-2 text-sm text-rose-600 hover:bg-rose-50 flex items-center gap-2.5 transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Cerrar Sesión
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 p-8">
            <div id="content-area"></div>
        </main>

        <footer class="border-t border-slate-200 px-8 py-3 flex justify-between text-xs text-slate-400 shrink-0">
            <span>© 2026 Sefired · Seguros &amp; Fianzas. Regulado por SUDEASEG.</span>
            <span>Desarrollado por <strong class="text-slate-500">Victecnology Lda</strong> · contacto@victecnology.com</span>
        </footer>
    </div>

<div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module" src="/main.js"></script>
</body>
</html>

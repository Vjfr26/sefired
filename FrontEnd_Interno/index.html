<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sefired — Panel Interno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="sidebar-container fixed inset-y-0 left-0 text-white flex flex-col z-50">
        <!-- Logo -->
        <div class="px-4 lg:px-5 pt-6 pb-5 shrink-0 border-b border-white/10">
            <!-- Mobile / tablet: horizontal row -->
            <div class="flex lg:hidden items-center gap-3.5 px-1">
                <div class="w-14 h-14 rounded-2xl bg-white/10 border border-white/15 flex items-center justify-center shrink-0 p-1">
                    <img src="/logo2.png" alt="Logo" class="w-full h-full object-contain brightness-0 invert">
                </div>
                <div class="min-w-0">
                    <p class="text-base font-black text-white leading-tight tracking-tight">SEFIRED</p>
                    <p class="text-xs font-semibold text-white/60 leading-tight mt-0.5">Cooperativa de Seguros<br>de Vehículos R.L.</p>
                </div>
            </div>
            <!-- Desktop: stacked, larger -->
            <div class="hidden lg:flex flex-col items-center text-center gap-3">
                <div class="w-28 h-28 rounded-3xl bg-white/10 border border-white/15 flex items-center justify-center p-1.5 shadow-lg">
                    <img src="/logo2.png" alt="Logo" class="w-full h-full object-contain brightness-0 invert">
                </div>
                <div>
                    <p class="text-xl font-black text-white tracking-tight">SEFIRED</p>
                    <p class="text-xs font-semibold text-white/55 mt-1 leading-snug">Cooperativa de Seguros<br>de Vehículos R.L.</p>
                </div>
            </div>
        </div>

        <nav id="sidebar-nav" class="flex-1 px-3 py-2 overflow-y-auto sidebar-scroll"></nav>
    </aside>

    <!-- OVERLAY (mobile sidebar) -->
    <div id="sidebar-overlay"></div>

    <!-- MAIN -->
    <div class="flex-1 lg:ml-64 flex flex-col min-h-screen relative">
        <header
            class="bg-sefired-light px-4 sm:px-8 lg:px-12 py-5 flex items-center justify-between shrink-0 border-b border-white/40 shadow-sm">
            <div class="flex items-center gap-3 min-w-0">
                <button id="sidebar-toggle"
                    class="lg:hidden p-2 rounded-xl hover:bg-slate-100 transition-colors shrink-0"
                    aria-label="Abrir menú">
                    <i data-lucide="menu" class="w-5 h-5 text-sefired-dark"></i>
                </button>
                <div class="min-w-0">
                    <h2 id="page-title" class="text-lg sm:text-2xl font-black text-sefired-dark tracking-tight truncate">—</h2>
                    <p id="page-subtitle" class="text-xs sm:text-sm text-slate-600 font-medium mt-0.5 truncate">—</p>
                </div>
            </div>
            <!-- User tools -->
            <div class="flex items-center shrink-0">
                <div class="relative" id="user-menu-wrap">
                    <button id="user-menu-btn"
                        class="flex items-center gap-2 px-2 sm:px-4 py-2 bg-white/50 backdrop-blur-sm rounded-full border border-white/50 cursor-pointer hover:bg-white transition-all shadow-sm">
                        <div id="user-header-initials"
                            class="w-6 h-6 rounded-full bg-sefired-dark flex items-center justify-center text-[10px] font-bold text-white">
                            CR</div>
                        <span id="user-header-name" class="hidden sm:inline text-sm font-bold text-sefired-dark">Carlos Ruiz</span>
                        <i data-lucide="chevron-down"
                            class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200"
                            id="user-chevron"></i>
                    </button>
                    <div id="user-dropdown"
                        class="hidden absolute right-0 top-full mt-2 w-48 sm:w-52 max-w-none bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden z-50">
                        <div class="px-4 py-3 border-b border-slate-100">
                            <p id="user-menu-name" class="text-sm font-bold text-slate-800 truncate">Carlos Ruiz</p>
                            <p id="user-menu-role" class="text-xs text-slate-500">Asesor de Ventas</p>
                        </div>
                        <button id="menu-logout"
                            class="w-full flex items-center gap-2.5 px-4 py-3 text-sm font-semibold text-rose-600 hover:bg-rose-50 transition-colors whitespace-nowrap">
                            <i data-lucide="log-out" class="w-4 h-4 shrink-0"></i>
                            Cerrar Sesión
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 px-4 sm:px-6 lg:px-12 pb-8 lg:pb-12 mt-2">
            <div id="content-area"></div>
        </main>
    </div>


    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- MODAL -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4 sm:p-6 backdrop-blur-sm">
        <div id="modal-box" class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-in zoom-in duration-200"></div>
    </div>

    <!-- PDF VIEWER -->
    <div id="pdf-overlay" class="hidden fixed inset-0 z-[70] flex flex-col">
        <!-- Toolbar -->
        <div class="bg-[#323639] text-white h-12 sm:h-14 flex items-center px-3 sm:px-5 gap-2 shrink-0 shadow-lg">
            <button onclick="closePdfViewer()" class="p-2 hover:bg-white/10 rounded-lg transition shrink-0" title="Cerrar">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <div class="flex-1 min-w-0 mx-1">
                <p id="pdf-title" class="text-sm font-semibold text-white truncate"></p>
            </div>
            <button onclick="printPdfDoc()" class="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition shrink-0">
                <i data-lucide="printer" class="w-4 h-4"></i>
                <span class="hidden sm:inline font-medium">Imprimir</span>
            </button>
            <button onclick="showToast('Descargando documento…','info')" class="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition shrink-0">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span class="hidden sm:inline font-medium">Descargar</span>
            </button>
        </div>
        <!-- Pages area -->
        <div class="flex-1 overflow-auto bg-[#525659] p-4 sm:p-8">
            <div id="pdf-pages" class="flex flex-col items-center gap-6"></div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sefired — Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body class="min-h-screen flex flex-col bg-sefired-light relative">

    <!-- DECORATIVE BACKGROUND BLOBS -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-sefired-blue/5 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-sefired-green/5 rounded-full blur-3xl"></div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 pt-1 pb-4 sm:px-6 sm:py-8">

        <div class="w-full max-w-sm sm:max-w-md">

            <!-- LOGO -->
            <div class="flex flex-col items-center mb-3 sm:mb-6">
                <img src="/logo1%20(Edited).png" alt="Logo Sefired" class="h-20 sm:h-28 lg:h-36 w-auto object-contain">
                <p
                    class="text-[8px] sm:text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] text-center mt-2.5">
                    La Venezolana de Seguros y Vida
                </p>
            </div>

            <!-- LOGIN CARD -->
            <div
                class="card p-4 sm:p-8 bg-white/50 backdrop-blur-2xl shadow-2xl shadow-sefired-blue/10 animate-in fade-in zoom-in duration-700">

                <div class="mb-3 sm:mb-6">
                    <h1 class="text-lg sm:text-2xl font-black text-slate-800 tracking-tight">Bienvenido</h1>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Ingresa tus credenciales para acceder al panel
                        interno</p>
                </div>

                <form id="login-form" class="space-y-3 sm:space-y-5">

                    <!-- Nick/Usuario -->
                    <div class="input-group">
                        <label class="input-label">Usuario / Nick</label>
                        <div class="relative">
                            <input type="text" id="nick" required
                                class="input-control h-10 sm:h-12 pl-10 bg-slate-50/50 border-slate-100 hover:border-sefired-blue/30 transition-all"
                                placeholder="Tu usuario">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                <i data-lucide="user" class="w-4 h-4"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <label class="input-label">Contraseña</label>
                        <div class="relative">
                            <input type="password" id="password" required
                                class="input-control h-10 sm:h-12 pl-10 bg-slate-50/50 border-slate-100 hover:border-sefired-blue/30 transition-all"
                                placeholder="••••••••">
                            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                <i data-lucide="key-round" class="w-4 h-4"></i>
                            </div>
                        </div>
                        <a href="#"
                            class="text-[9px] sm:text-[10px] font-bold text-sefired-blue hover:underline uppercase tracking-tighter mt-1 inline-block">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <!-- Remember -->
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember"
                            class="w-3.5 h-3.5 rounded border-slate-300 text-sefired-green focus:ring-sefired-green shrink-0">
                        <label for="remember" class="text-xs text-slate-500 font-medium cursor-pointer select-none">
                            Recordar sesión
                        </label>
                    </div>

                    <!-- Cloudflare Turnstile -->
                    <div class="flex justify-center overflow-hidden">
                        <div class="cf-turnstile w-full" data-sitekey="0x4AAAAAADPWm4GmxJIO3s97" data-theme="light">
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit"
                        class="btn-primary w-full py-1.5 text-sm font-black rounded-xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
                        Iniciar Sesión
                    </button>

                </form>
            </div>

            <!-- Help link -->
            <p class="mt-3 text-center text-xs text-slate-500 font-medium">
                ¿Necesitas ayuda?
                <a href="#" class="text-sefired-blue font-bold hover:underline">Contactar soporte técnico</a>
            </p>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="w-full px-4 py-3 sm:py-5 border-t border-slate-200/60 bg-white/20 backdrop-blur-sm">
        <div class="flex flex-col items-center gap-0.5 text-center px-2">
            <p class="text-[10px] font-bold text-slate-700 uppercase tracking-widest leading-snug">
                © 2024 SEFIRED R.L. — Todos los derechos reservados
            </p>
            <p class="text-[9px] text-slate-400 uppercase tracking-[0.15em] leading-snug">
                V 2.4.0 — Internal System · Made with <span class="text-red-400">❤</span> by Victecnology lda.
            </p>
        </div>
    </footer>

    <script type="module">
        import { createIcons, User, KeyRound } from 'lucide';
        createIcons({ icons: { User, KeyRound } });

        const form = document.getElementById('login-form');
        const btn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get Turnstile token
            const turnstileToken = typeof turnstile !== 'undefined' ? turnstile.getResponse() : null;

            if (!turnstileToken) {
                alert('Por favor, completa la verificación de seguridad.');
                return;
            }

            const nick = document.getElementById('nick').value;
            const password = document.getElementById('password').value;

            // Loading state
            const originalBtnContent = btn.innerHTML;
            btn.innerHTML = `<div class="flex items-center justify-center gap-2">
                <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                <span>Autenticando...</span>
            </div>`;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                const response = await fetch('http://localhost:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        nick,
                        password,
                        turnstile_token: turnstileToken
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('auth_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/index.html';
                } else {
                    alert(data.message || 'Error al iniciar sesión');
                    if (typeof turnstile !== 'undefined') turnstile.reset();
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('No se pudo conectar con el servidor.');
            } finally {
                btn.innerHTML = originalBtnContent;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        });
    </script>
</body>

</html>

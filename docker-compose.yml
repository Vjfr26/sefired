services:

  # ── Redis — sesiones y caché en memoria ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sefired-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --tcp-backlog 511
        --tcp-keepalive 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MySQL — tuneado para alta concurrencia ────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: sefired-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - "./BD/sefired (1).sql:/docker-entrypoint-initdb.d/init.sql:ro"
    command: >
      --innodb_buffer_pool_size=1G
      --innodb_log_file_size=256M
      --innodb_flush_log_at_trx_commit=2
      --innodb_flush_method=O_DIRECT
      --max_connections=500
      --thread_cache_size=100

      --tmp_table_size=64M
      --max_heap_table_size=64M
      --join_buffer_size=4M
      --sort_buffer_size=4M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend — FrankenPHP con 200 workers PHP persistentes ────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: sefired-backend
    restart: unless-stopped
    environment:
      APP_NAME: "J&M"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: local
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      FRANKENPHP_WORKERS: 200
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - backend_storage:/var/www/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Queue worker — procesa emails y jobs sin bloquear peticiones HTTP ─────────
  queue-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: sefired-queue
    restart: unless-stopped
    environment:
      APP_NAME: "J&M"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: local
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    command: >
      sh -c "
        php artisan config:cache &&
        php artisan queue:work
          --sleep=3
          --tries=3
          --max-time=3600
          --memory=256
      "
    volumes:
      - backend_storage:/var/www/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── Scheduler — ejecuta php artisan schedule:run cada minuto ────────────────
  scheduler:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: sefired-scheduler
    restart: unless-stopped
    environment:
      APP_NAME: "J&M"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: local
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    command: >
      sh -c "
        php artisan config:cache &&
        while true; do
          php artisan schedule:run --no-interaction
          sleep 60
        done
      "
    volumes:
      - backend_storage:/var/www/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── Frontend interno — Nginx sirviendo build estático ────────────────────────
  frontend-interno:
    build:
      context: ./FrontEnd_Interno
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL_INTERNO}
    container_name: sefired-frontend-interno
    restart: unless-stopped
    ports:
      - "${FRONTEND_INTERNO_PORT}:5173"
    depends_on:
      - backend

  # ── Frontend clientes — Nginx sirviendo build estático ────────────────────────
  frontend-clientes:
    build:
      context: ./FrontEnd_Clientes
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL_CLIENTES}
    container_name: sefired-frontend-clientes
    restart: unless-stopped
    ports:
      - "${FRONTEND_CLIENTES_PORT}:5174"

  # ── phpMyAdmin (solo para desarrollo) ────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sefired-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "8083:80"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - dev

volumes:
  db_data:
  backend_storage:
